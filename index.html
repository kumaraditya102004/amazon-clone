<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">amazon</div>

    <input
    type="text"
    id="search"
    placeholder="Search products...">

    <button id="themeBtn">🌙</button>

    <div class="cart-btn">
        🛒 Cart (<span id="cart-count">0</span>)
    </div>

</nav>

<!-- Hero Section -->

<section class="hero">

    <h1>🔥 Aditya Electronics Sale</h1>

    <p>
        Up to 70% Off on Mobiles,
        Laptops & Accessories
    </p>

    <button>Shop Now</button>

</section>

<!-- Categories -->

<div class="categories">

    <div>📱 Mobiles</div>

    <div>💻 Laptops</div>

    <div>⌚ Watches</div>

    <div>🎧 Headphones</div>

</div>

<!-- Toast -->

<div id="toast"></div>

<!-- Main Container -->

<div class="container">

    <div
    class="products"
    id="products">

    </div>

    <div class="cart">

        <h2>
            Shopping Cart
        </h2>

        <div id="cart-items">

        </div>

        <h3>
            Total:
            ₹<span id="total">0</span>
        </h3>

    </div>

</div>

<!-- Footer -->

<footer>

    <h3>
        Amazon Clone
    </h3>

    <p>
        Made By Aditya 🚀
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
